<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ishaan's Uber DJ Hub</title>
    <style>
        :root { --spotify-green: #1DB954; --dark-bg: #121212; --card-bg: #181818; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark-bg); color: white; text-align: center; padding: 20px; margin: 0; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; }
        h1 { color: var(--spotify-green); margin-bottom: 5px; }
        
        input { width: 90%; padding: 15px; border-radius: 30px; border: none; font-size: 16px; margin-bottom: 20px; outline: none; background: #222; color: white; transition: 0.3s; }
        input:focus { box-shadow: 0 0 10px var(--spotify-green); }

        .song-card { background: var(--card-bg); padding: 10px; margin: 10px 0; border-radius: 8px; display: flex; align-items: center; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .song-card:active { transform: scale(0.98); background: #282828; }
        .song-info { text-align: left; margin-left: 15px; }
        .song-title { font-weight: bold; display: block; }
        .song-artist { font-size: 0.8em; color: #b3b3b3; }

        #queue-preview { margin: 30px 0; padding: 15px; background: #000; border-radius: 12px; text-align: left; border: 1px solid #222; }
        #queue-list { list-style: none; padding: 0; font-size: 0.9em; }
        #queue-list li { padding: 10px 0; border-bottom: 1px solid #222; color: #e0e0e0; }
        #queue-list li:last-child { border-bottom: none; }

        .status-box { border-radius: 12px; padding: 20px; margin: 20px 0; animation: fadeIn 0.3s ease-out; }
        .loading { border: 2px solid #444; background: rgba(255, 255, 255, 0.05); }
        .success { border: 2px solid var(--spotify-green); background: rgba(29, 185, 84, 0.15); }

        /* Ko-fi Container Styling */
        .kofi-container { 
            margin-top: 40px; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid #333;
            background: #fff; /* Keeping background white so the iframe looks native */
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .admin-btn { position: fixed; bottom: 10px; right: 10px; opacity: 0.1; font-size: 10px; color: white; background: none; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Be the DJ 🎵</h1>
        <p style="color:#b3b3b3; margin-top: 0;">Request a song for the car!</p>
        
        <input type="text" id="search-input" placeholder="Search song or artist...">
        <div id="results"></div>

        <div id="queue-preview">
            <strong style="color: var(--spotify-green); font-size: 1.1em;">Up Next:</strong>
            <ul id="queue-list"><li>Waiting for car to sync...</li></ul>
        </div>

        <div style="margin-top: 40px;">
            <h3>Enjoying the ride? ⭐</h3>
            <div class="kofi-container">
                <iframe id='kofiframe' src='https://ko-fi.com/ishaanjolly/?hidefeed=true&widget=true&embed=true&preview=true' style='border:none;width:100%;padding:4px;' height='712' title='ishaanjolly'></iframe>
            </div>
        </div>
    </div>

    <button class="admin-btn" id="login-button">Admin Sync</button>
    <script src="app.js"></script>
</body>
</html>
